<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <img id="imageSrc" width="300"></img>
  <h3 id="dog"></h3>
  <script src="./lib/animal-api.js"></script>
  <script>
    console.log('animalapi', AnimalApi)
    AnimalApi.default.getDog().then(res => {
      document.getElementById('imageSrc').src = res.imageSrc
      document.getElementById('dog').innerText = res.text
    })
  </script>
</body>
</html>
